# ── Variables ──────────────────────────────────────────────────────────
$terminal = uwsm-app -- xdg-terminal-exec
$browser = omarchy-launch-browser

# ── Application Launchers ─────────────────────────────────────────────
bindd = SUPER ALT, RETURN, Terminal, exec, $terminal --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" tmux new
bindd = SUPER SHIFT, RETURN, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT, B, Browser, exec, $browser
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER ALT SHIFT, F, File manager (cwd), exec, uwsm-app -- nautilus --new-window "$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, M, Music, exec, omarchy-launch-or-focus spotify
bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor
bindd = SUPER SHIFT, V, Discord, exec, vesktop
bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus "^obsidian$" "uwsm-app -- obsidian"

# ── Utilities ─────────────────────────────────────────────────────────
bind = SUPER, D, exec, $(omarchy-restart-nwg-dock)
bindd = SUPER, grave, Window switch, exec, vicinae vicinae://extensions/vicinae/wm/switch-windows

# ── Vicinae Overrides ─────────────────────────────────────────────────
unbind = SUPER, SPACE
bind = SUPER, SPACE, exec, vicinae toggle

unbind = SUPER ALT, SPACE
bind = SUPER ALT, SPACE, exec, vicinae vicinae://extensions/codingcodax/omarchy-menu/index

unbind = SUPER CTRL, E
bindd = SUPER CTRL, E, Emoji picker, exec, vicinae vicinae://extensions/vicinae/core/search-emojis

unbind = SUPER, ESCAPE
bindd = SUPER, ESCAPE, Power profiles, exec, vicinae vicinae://extensions/botkooper/power-profile/power-profile

unbind = SUPER CTRL, A
bindd = SUPER CTRL, A, Audio controls, exec, vicinae vicinae://extensions/rastsislaux/pulseaudio/pulseaudio

unbind = SUPER CTRL, W
bindd = SUPER CTRL, W, Wifi controls, exec, vicinae vicinae://extensions/dagimg-dot/wifi-commander

unbind = SUPER CTRL, B
bindd = SUPER CTRL, B, Bluetooth, exec, vicinae vicinae://extensions/Gelei/bluetooth

unbind = SUPER CTRL, V
bindd = SUPER CTRL, V, Clipboard, exec, vicinae vicinae://extensions/vicinae/clipboard/history

unbind = , XF86PowerOff 
bindld = , XF86PowerOff, Power menu, exec, vicinae vicinae://launch/@codingcodax/store.vicinae.omarchy-menu/system

# ── Hyprscrolling: Window Focus ──────────────────────────────────────
unbind = SUPER, LEFT
unbind = SUPER, RIGHT
unbind = SUPER, UP
unbind = SUPER, DOWN
bindd = SUPER, LEFT, Move window focus left, layoutmsg, focus l
bindd = SUPER, RIGHT, Move window focus right, layoutmsg, focus r
bindd = SUPER, UP, Move window focus up, layoutmsg, focus u
bindd = SUPER, DOWN, Move window focus down, layoutmsg, focus d

# ── Hyprscrolling: Move Windows ──────────────────────────────────────
unbind = SUPER SHIFT, LEFT
unbind = SUPER SHIFT, RIGHT
unbind = SUPER SHIFT, UP
unbind = SUPER SHIFT, DOWN
bindd = SUPER SHIFT, LEFT, Move window left, layoutmsg, movewindowto l
bindd = SUPER SHIFT, RIGHT, Move window right, layoutmsg, movewindowto r
bindd = SUPER SHIFT, UP, Move window up, layoutmsg, movewindowto u
bindd = SUPER SHIFT, DOWN, Move window down, layoutmsg, movewindowto d

# ── Hyprscrolling: Column Resize ─────────────────────────────────────
unbind = SUPER, code:20
unbind = SUPER, code:21
unbind = SUPER SHIFT, code:20
unbind = SUPER SHIFT, code:21
bindd = SUPER, code:20, Shrink column, layoutmsg, colresize -0.05
bindd = SUPER, code:21, Expand column, layoutmsg, colresize +0.05
bindd = SUPER SHIFT, code:20, Previous preset width, layoutmsg, colresize -conf
bindd = SUPER SHIFT, code:21, Next preset width, layoutmsg, colresize +conf
bindd = SUPER SHIFT, G, Toggle fit/center mode, layoutmsg, togglefit

# ── Hyprscrolling: Column Management ─────────────────────────────────
unbind = SUPER, P
unbind = SUPER, J
bindd = SUPER, P, Promote window to new column, layoutmsg, promote
bindd = SUPER, J, Fit active column, layoutmsg, fit active

bindd = SUPER CTRL SHIFT, LEFT, Swap column left, layoutmsg, swapcol l
bindd = SUPER CTRL SHIFT, RIGHT, Swap column right, layoutmsg, swapcol r

# ── Hyprscrolling: Viewport Panning ──────────────────────────────────
bindd = SUPER, bracketleft, Scroll layout left, layoutmsg, move -col
bindd = SUPER, bracketright, Scroll layout right, layoutmsg, move +col
bindd = SUPER, HOME, Fit layout to beginning, layoutmsg, fit tobeg
bindd = SUPER, END, Fit layout to end, layoutmsg, fit toend

# ── Trackpad Gestures ────────────────────────────────────────────────
# 3-finger swipe left/right: switch workspaces
gesture = 3, up, dispatcher, workspace, -1
gesture = 3, down, dispatcher, workspace, +1
# 3-finger swipe left/right: pan viewport (scrolling layout)
gesture = 3, left, dispatcher, layoutmsg, move -col
gesture = 3,right, dispatcher, layoutmsg, move +col

# ── Hyprscrolling: Move Column to Workspace ──────────────────────────
bindd = SUPER CTRL SHIFT, code:10, Move column to workspace 1, layoutmsg, movecoltoworkspace 1
bindd = SUPER CTRL SHIFT, code:11, Move column to workspace 2, layoutmsg, movecoltoworkspace 2
bindd = SUPER CTRL SHIFT, code:12, Move column to workspace 3, layoutmsg, movecoltoworkspace 3
bindd = SUPER CTRL SHIFT, code:13, Move column to workspace 4, layoutmsg, movecoltoworkspace 4
bindd = SUPER CTRL SHIFT, code:14, Move column to workspace 5, layoutmsg, movecoltoworkspace 5
bindd = SUPER CTRL SHIFT, code:15, Move column to workspace 6, layoutmsg, movecoltoworkspace 6
bindd = SUPER CTRL SHIFT, code:16, Move column to workspace 7, layoutmsg, movecoltoworkspace 7
bindd = SUPER CTRL SHIFT, code:17, Move column to workspace 8, layoutmsg, movecoltoworkspace 8
bindd = SUPER CTRL SHIFT, code:18, Move column to workspace 9, layoutmsg, movecoltoworkspace 9
bindd = SUPER CTRL SHIFT, code:19, Move column to workspace 10, layoutmsg, movecoltoworkspace 10

# ── Scratchpad gestures ──────────────────────────
gesture = 4, up, dispatcher, togglespecialworkspace, scratchpad
gesture = 4, down, dispatcher, togglespecialworkspace, scratchpad
