# windowrule = float on, match:class (org.omarchy.gazelle)
windowrule = size 1100 700, match:class localsend
windowrule = size 1100 700, match:class  org.gnome.Evince

windowrule {
    name = scrcpy-size
    match:class = ^(scrcpy)$
    float = on
    # size = 488 1083
}

windowrule {
    name = gtk-portal
    match:class = ^(xdg-desktop-portal-gtk)$
    float = on
    size = monitor_w/2 monitor_h/2 

}

windowrule {
    name = hyprland-share-picker-float
    match:class = ^(hyprland-share-picker)$
    float = on
    # size = 488 1083
}

windowrule {
    name = scratchpad-blur
    match:workspace = special:scratchpad
    no_blur = off
}

windowrule {
    name = tile-localsend
    match:class = ^(localsend)$
    float = off
    tile = on
}

windowrule = tag +terminal, match:class (foot|footclient)

