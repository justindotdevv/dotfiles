render {
    cm_enabled = false
}

cursor {
  no_hardware_cursors = true
}

# Override Omarchy default's `col.border_locked_active/inactive = -1`,
# which Hyprland 0.55+ rejects (gradient parser no longer accepts -1).
group {
    col.border_locked_active = $activeBorderColor
    col.border_locked_inactive = $inactiveBorderColor
}


general {
    resize_on_border = true
    layout = scrolling

    # top, right, bottom, left
    gaps_out = 5,5,5,5
    gaps_in = 5,5,5,5

    hover_icon_on_border = true
    border_size = 1
}

decoration {
    # macOS-style squircle: ~12px radius with high rounding_power for the
    # superellipse curve Apple uses on window corners.
    rounding = 15
    rounding_power = 4
    active_opacity = 1
    inactive_opacity = 1

    shadow {
        enabled = false
        range = 22
        render_power = 2
        color = rgba(01010190)
    }

    blur {
        enabled = true
        size = 9
        passes = 5
        ignore_opacity = true
        xray = false
        new_optimizations = true
        contrast = 1.2
        brightness = 0.8
    }
}

scrolling {
    column_width = 0.97
    fullscreen_on_one_column = false
    focus_fit_method = 0
    follow_focus = true
    # follow_min_visible = 0.5
}

animations {
    enabled = true
    bezier = smooth, 0.25, 1, 0.5, 1
    # bezier = smoothFade, 0.22, 0.68, 0.0, 1.0
    # animation = windowsIn, 1, 5,smooth, popin 80%
    # animation = windowsOut, 1, 5, smooth, popin 80%
    # animation = windowsMove, 1, 3, smooth, slide
    animation = workspaces, 1, 2, smooth, slidevert
    # animation = layers, 1, 6, smooth, slide
    animation = specialWorkspaceIn, 1, 2, smooth, slidefadevert
    animation = specialWorkspaceOut, 1, 2, smooth, slidefadevert
    # animation = fade, 1, 5, smooth
}
