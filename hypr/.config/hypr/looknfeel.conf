render {
    cm_enabled = false
}

general {
    resize_on_border = true
    layout = scrolling
    gaps_out = 2,7,6,7
    gaps_in = 1,2,1,2
    hover_icon_on_border = true
    border_size = 2
}

decoration {
    rounding = 20
    rounding_power = 2
    active_opacity = 1
    inactive_opacity = 1

    shadow {
        enabled = false
        range = 22
        render_power = 2
        color = rgba(01010190)
    }

    blur {
        enabled = true
        size = 4
        passes = 4
        ignore_opacity = true
        xray = false
        new_optimizations = true
        contrast = 1.2
        brightness = 0.8
    }
}

scrolling {
    column_width = 0.8
    fullscreen_on_one_column = false
    focus_fit_method = 0
    follow_focus = false
    # follow_min_visible = 0.0
}

animations {
    enabled = true
    bezier = smooth, 0.25, 1, 0.5, 1
    bezier = smoothFade, 0.22, 0.68, 0.0, 1.0
    animation = windowsIn, 1, 5,smooth, popin 80%
    animation = windowsOut, 1, 5, smooth, popin 80%
    animation = windowsMove, 1, 3, smooth, slide
    animation = workspaces, 1, 3, smooth, slidevert
    animation = layers, 1, 6, smooth, slide
    animation = specialWorkspaceIn, 1, 3, smooth, slidefadevert
    animation = specialWorkspaceOut, 1, 3, smooth, slidefadevert
    animation = fade, 1, 5, smooth
}
