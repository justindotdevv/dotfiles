source = colors.conf
$Scripts = $HOME/.config/hypr/scripts

general {
    grace = 1
    fractional_scaling = 2
    immediate_render = true
}

background {
    monitor =
    path = ~/.config/omarchy/current/background
    color = rgb(9,9,9)
    blur_size = 3
    blur_passes = 4
    noise = 0.0117
    contrast = 1.3000
    brightness = 0.6000
    vibrancy = 0.2100
    vibrancy_darkness = 0.0
}

label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%H") </big></b>"
    color = $on_secondary_container
    font_size = 112
    font_family = Geist
    shadow_passes = 0
    shadow_size = 0
    position = 0, 220
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%M") </big></b>"
    color = $on_secondary_container
    font_size = 112
    font_family = Giest
    shadow_passes = 0
    shadow_size = 0
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:18000000] echo "<b><big> "$(date +'%A')" </big></b>"
    color = $secondary
    font_size = 18
    font_family = Geist
    position = 0, -15
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:18000000] echo "<b> "$(date +'%d %b')" </b>"
    color = $secondary
    font_size = 14
    font_family = Geist
    position = 0, -40
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3
    dots_size = 0.26
    dots_spacing = 0.64
    dots_center = true
    dots_rouding = -1
    rounding = 22
    outer_color = $source_color
    inner_color = rgba(255, 255, 255, 0.1)
    font_color = rgb(255,255,255)
    fade_on_empty = true
    placeholder_text = 
    position = 0, 240
    halign = center
    valign = bottom
}

label {
    monitor =
    text = 
    color = rgba(255,255,255,0.60)
    font_size = 14
    font_family = Geist 
    shadow_passes = 0
    position = 0, -110
    halign = center
}

shape {
    monitor =
    color = rgba(255,255,255,0.5)
    size = 200, 5
    rounding = 99
    position = 0, 10
    halign = center
}

label {
    text =        
    color = rgba(255,255,255,0.999)
    font_size = 10
    font_family = Giest
    position = 0, -190
    halign = center
}
