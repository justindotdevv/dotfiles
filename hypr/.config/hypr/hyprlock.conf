source = ~/.config/omarchy/current/theme/hyprlock.conf

background {
    monitor =
    color = $color
    path = ~/.config/omarchy/current/background
    blur_passes = 3
}

animations {
    enabled = true
}

# Time display above input field
label {
    monitor =
    text = cmd[update:1000] date '+%-I:%M'
    color = $font_color
    font_size = 64
    font_family = CaskaydiaMono Nerd Font Propo
    position = 0, 200
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 3
    shadow_color = rgba(0, 0, 0, 0.5)
    zindex = 1
}

input-field {
    monitor =
    size = 650, 100
    position = 0, 0
    halign = center
    valign = center

    inner_color = $inner_color
    outer_color = $outer_color
    outline_thickness = 4

    font_family = CaskaydiaMono Nerd Font Propo
    font_color = $font_color

    placeholder_text = Enter Password 󰈷
    check_color = $check_color
    fail_text = <i>$FAIL ($ATTEMPTS)</i>

    rounding = 0
    shadow_passes = 0
    fade_on_empty = false
}

auth {
    fingerprint:enabled = false
}

# Shutdown button
label {
    monitor =
    text = ⏻
    color = $font_color
    font_size = 24
    font_family = CaskaydiaMono Nerd Font Propo
    position = -80, 80
    halign = center
    valign = bottom
    onclick = systemctl poweroff
    shadow_passes = 1
    shadow_size = 2
    shadow_color = rgba(0, 0, 0, 0.5)
    zindex = 3
}

# Suspend button
label {
    monitor =
    text = 󰤄
    color = $font_color
    font_size = 24
    font_family = CaskaydiaMono Nerd Font Propo
    position = 0, 80
    halign = center
    valign = bottom
    onclick = systemctl suspend
    shadow_passes = 1
    shadow_size = 2
    shadow_color = rgba(0, 0, 0, 0.5)
    zindex = 3
}

# Reboot button
label {
    monitor =
    text = 
    color = $font_color
    font_size = 24
    font_family = CaskaydiaMono Nerd Font Propo
    position = 80, 80
    halign = center
    valign = bottom
    onclick = systemctl reboot
    shadow_passes = 1
    shadow_size = 2
    shadow_color = rgba(0, 0, 0, 0.5)
    zindex = 3
}
